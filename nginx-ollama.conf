# ============================================================
# FIX-R — Nginx reverse proxy config for Ollama
# Place at: /etc/nginx/sites-available/ollama
# Then: sudo ln -s /etc/nginx/sites-available/ollama /etc/nginx/sites-enabled/
# Certbot will automatically add the SSL/HTTPS blocks below.
# ============================================================

server {
    listen 80;
    server_name YOUR_DOMAIN_HERE;

    # Certbot will add HTTPS redirect here automatically.
    # After running: sudo certbot --nginx -d YOUR_DOMAIN_HERE
    # this file will be updated with SSL certificate paths.

    location / {
        proxy_pass         http://127.0.0.1:11434;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # LLM responses can take a long time — set generous timeouts
        proxy_read_timeout    120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    120s;

        # Allow large request bodies (images, long prompts)
        client_max_body_size 50M;

        # CORS — allows FIX-R (and iOS app) to call this endpoint from any origin
        add_header Access-Control-Allow-Origin  "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;

        # Handle preflight OPTIONS requests
        if ($request_method = OPTIONS) {
            return 204;
        }
    }
}
